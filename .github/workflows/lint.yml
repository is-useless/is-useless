# taken from https://github.com/10xly/FalseJS/blob/universe/.github/workflows/lint.yml

name: eslint

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  quality-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "25"
      - name: Install
        run: npm install
      - name: Run 10xly Lint
        run: npx eslint . --max-warnings 0